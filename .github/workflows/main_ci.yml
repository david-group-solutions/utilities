name: Main CI

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
              8.0.x
              9.0.x
              10.0.x

      - name: Build
        working-directory: ./
        run: dotnet build -c Release /p:ContinuousIntegrationBuild=true

  test:
    name: Tests on ${{ matrix.os }}
    needs: [ build ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-26, ubuntu-latest, windows-latest ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
              8.0.x
              9.0.x
              10.0.x

      - name: Test
        working-directory: ./
        run: dotnet test --logger:trx --logger:GitHubActions

  update_release_draft:
    name: Release Drafter
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
    
      - name: Compute version info
        id: version
        run: |
          version=$(xmllint --xpath "string(//Project/PropertyGroup/VersionPrefix)" Directory.Version.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"

          echo "Package version is $version"

      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: "v${{ steps.version.outputs.version }}"
